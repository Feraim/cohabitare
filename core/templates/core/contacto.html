{% extends 'core/base.html' %}

{% block title %}Contacto{% endblock %}

{% block content %}
    <h1 style="text-align: center; margin-bottom: 2rem;">Ponte en Contacto</h1>

    <div class="glass-card" style="max-width: 600px; margin: 0 auto;">
        <p style="text-align: center; margin-bottom: 2rem;">¿Tienes un proyecto en mente o buscas colaboración institucional? Escríbenos.</p>
        
        <form action="#" method="POST" class="contact-form">
            <!-- CSRF token placeholder para cuando lo vincules en el futuro -->
            {% csrf_token %}
            
            <div class="form-group">
                <label for="name">Nombre / Entidad</label>
                <input type="text" id="name" name="name" required placeholder="Tu nombre...">
            </div>

            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" name="email" required placeholder="tu-correo@ejemplo.com">
            </div>

            <div class="form-group">
                <label for="subject">Asunto</label>
                <select id="subject" name="subject" class="form-group" style="width: 100%; padding: 1rem; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-color); color: var(--text-color); font-family: inherit;">
                    <option value="proyecto">Consultoría Arquitectónica</option>
                    <option value="colaboracion">Colaboración Institucional / I+D</option>
                    <option value="academico">Cuestión Académica (Tesis, Charlas)</option>
                    <option value="otro">Otro</option>
                </select>
            </div>

            <div class="form-group">
                <label for="message">Mensaje</label>
                <textarea id="message" name="message" rows="5" required placeholder="Cuéntanos sobre tus ideas..."></textarea>
            </div>

            <button type="submit" class="submit-btn" onclick="event.preventDefault(); alert('Este es un diseño funcional y responsive. La conexión a un correo real en el backend se hará próximamente.');">Enviar Mensaje</button>
        </form>
    </div>
{% endblock %}
